display_information:
  name: GrantScribe
  description: Removes the money barrier to opportunity — finds grants & scholarships you qualify for (drafted in your voice) and free ways to learn anything.
  background_color: "#1a4d2e"
features:
  bot_user:
    display_name: grantscribe
    always_online: true
  slash_commands:
    - command: /grants
      description: Find federal grants for your work
      usage_hint: what your org does + what you need
      should_escape: false
    - command: /learn
      description: Find free ways to learn something
      usage_hint: what you want to learn
      should_escape: false
    - command: /ask
      description: Ask a learning question, answered from free open textbooks
      usage_hint: your question
      should_escape: false
oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
settings:
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
